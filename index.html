<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация Pixel Rooms</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            display: none; /* Скрыта по умолчанию */
        }
    </style>
</head>
<body>

<div id="status-icon" class="loader"></div>
<h1 id="status-text">Обработка входа Google...</h1>

<button id="manual-redirect">Вернуться в игру</button>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const stateRaw = urlParams.get('state'); // Это строка "{...}"

        if (code && stateRaw) {
            try {
                console.log("stateRaw:", stateRaw);
                
                // 1. ПРЕВРАЩАЕМ СТРОКУ В ОБЪЕКТ (Это критически важно)
                const stateObj = JSON.parse(decodeURIComponent(stateRaw));

                // 2. Достаем адрес из объекта
                const targetBaseUrl = stateObj.registration_address;

                if (targetBaseUrl) {
                    // 3. Собираем финальную ссылку
                    // state передаем обратно как строку, чтобы Godot мог его распарсить
                    const targetUrl = `${targetBaseUrl}/?code=${code}&state=${encodeURIComponent(stateRaw)}`;

                    console.log("Переход на:", targetUrl);
                    window.location.replace(targetUrl);
                } else {
                    document.getElementById('status-text').innerText = "Ошибка: в state нет адреса";
                }
            } catch (e) {
                console.error("Ошибка парсинга:", e);
                document.getElementById('status-text').innerText = "Ошибка обработки данных state";
            }
        } else {
            document.getElementById('status-text').innerText = "Ошибка: данные от Google не полные";
        }
    };
</script>
</body>
</html>
